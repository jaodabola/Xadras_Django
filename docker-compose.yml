

services:
  # Backend Service
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: xadras-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - DJANGO_SETTINGS_MODULE=xadras.settings
      - PYTHONUNBUFFERED=1
      - DEBUG=${DEBUG:-0}
    volumes:
      - ./backend:/usr/src/app
      - static_volume:/usr/src/app/xadras/staticfiles
      - media_volume:/usr/src/app/xadras/media
    # ports: - "8000:8000" # Porta removida em produção para segurança
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - xadras-network



  # Frontend Service
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: xadras-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - static_volume:/usr/src/app/xadras/staticfiles
      - media_volume:/usr/src/app/xadras/media
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend
    networks:
      - xadras-network

  # Serviço Cloudflare Tunnel
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: xadras-cloudflared
    restart: unless-stopped
    command: tunnel run
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - frontend
    networks:
      - xadras-network


  # Database Service
  db:
    image: postgres:15-alpine
    container_name: xadras-db
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - xadras-network

  # Redis Service
  redis:
    image: redis:7-alpine
    container_name: xadras-redis
    restart: unless-stopped
    # SECURITY: Redis port removed from host exposure - internal network only
    command: redis-server --requirepass ${REDIS_PASSWORD}
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - redis_data:/data
    networks:
      - xadras-network


# Volumes
volumes:
  postgres_data:
  redis_data:
  static_volume:
  media_volume:

# Networks
networks:
  xadras-network:
    driver: bridge
