

services:
  # Backend Service
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: xadras-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - DJANGO_SETTINGS_MODULE=xadras.settings
      - PYTHONUNBUFFERED=1
      - DEBUG=0
    volumes:
      - ./backend:/usr/src/app
      - static_volume:/usr/src/app/xadras/staticfiles
      - media_volume:/usr/src/app/xadras/media
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - xadras-network

  # Matchmaking Service
  matchmaking:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: xadras-matchmaking
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - DJANGO_SETTINGS_MODULE=xadras.settings
      - PYTHONUNBUFFERED=1
      - DEBUG=0
    entrypoint: ["python", "matchmaking/matchmaking_service.py"]
    volumes:
      - ./backend:/usr/src/app
      - static_volume:/usr/src/app/xadras/staticfiles
      - media_volume:/usr/src/app/xadras/media
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - xadras-network

  # Frontend Service
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: xadras-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - static_volume:/usr/src/app/xadras/staticfiles
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend
    networks:
      - xadras-network

  # Database Service
  db:
    image: postgres:15-alpine
    container_name: xadras-db
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - xadras-network

  # Redis Service
  redis:
    image: redis:7-alpine
    container_name: xadras-redis
    restart: unless-stopped
    # SECURITY: Redis port removed from host exposure - internal network only
    command: redis-server --requirepass ${REDIS_PASSWORD}
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - redis_data:/data
    networks:
      - xadras-network

  # Vision AI Service
  vision-service:
    build:
      context: ./vision-service
      dockerfile: Dockerfile
    container_name: xadras-vision-service
    restart: unless-stopped
    environment:
      - BACKEND_URL=http://xadras-backend:8000
      - WS_URL=ws://xadras-backend:8000/ws/vision/
      - LOG_LEVEL=INFO
      - PYTHONUNBUFFERED=1
      - CAMERA_INDEX=0  # Windows: Camera index for OpenCV
      - CAMERA_WIDTH=1920  # Full HD width
      - CAMERA_HEIGHT=1080  # Full HD height
    volumes:
      - ./vision-service:/app
      - vision_calibrations:/app/data/calibrations
      - vision_logs:/app/logs
      # Camera device access configuration
      # Windows: Uses OpenCV with camera index (0, 1, 2, etc.)
      # Linux: Uncomment device mapping below for direct hardware access
      # - /dev:/dev  # Access to camera devices (Linux only)
    # privileged: true  # Required for camera access (Linux only)
    # devices:  # Linux camera devices (uncomment for Linux)
    #   - /dev/video0:/dev/video0  # Primary camera
    #   - /dev/video1:/dev/video1  # Secondary camera (if available)
    ports:
      - "8001:8001"  # Health check port
    depends_on:
      backend:
        condition: service_started
      redis:
        condition: service_healthy
    networks:
      - xadras-network


# Volumes
volumes:
  postgres_data:
  redis_data:
  static_volume:
  media_volume:
  vision_calibrations:
  vision_logs:

# Networks
networks:
  xadras-network:
    driver: bridge
