services:
  backend:
    build:
      context: ./backend
      target: dev
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./backend:/usr/src/app
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DEBUG=True
    depends_on:
      - db
      - redis
    networks:
      - xadras-network

  frontend:
    build:
      context: ./frontend
      target: dev
    volumes:
      - ./frontend:/app
    command: npm run dev
    ports:
      - "5173:5173"
    networks:
      - xadras-network
