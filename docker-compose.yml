services:
  db:
    image: postgres:15-alpine
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    networks:
      - xadras-network

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    networks:
      - xadras-network

volumes:
  postgres_data:
  redis_data:
  static_volume:
  media_volume:

networks:
  xadras-network:
    driver: bridge
