services:
  backend:
    build:
      context: ./backend
      target: prod
    container_name: xadras-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - DJANGO_SETTINGS_MODULE=xadras.settings
      - DEBUG=False
    volumes:
      - static_volume:/usr/src/app/xadras/staticfiles
      - media_volume:/usr/src/app/xadras/media
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - xadras-network

  frontend:
    build:
      context: ./frontend
      target: prod
    container_name: xadras-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - static_volume:/usr/src/app/xadras/staticfiles
      - media_volume:/usr/src/app/xadras/media
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend
    networks:
      - xadras-network

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: xadras-cloudflared
    restart: unless-stopped
    command: tunnel run
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - frontend
    networks:
      - xadras-network

  db:
    image: postgres:15-alpine
    container_name: xadras-db
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}" ]
      interval: 5s
      retries: 5
    networks:
      - xadras-network

  redis:
    image: redis:7-alpine
    container_name: xadras-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    healthcheck:
      test: [ "CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping" ]
      interval: 5s
      retries: 5
    volumes:
      - redis_data:/data
    networks:
      - xadras-network
